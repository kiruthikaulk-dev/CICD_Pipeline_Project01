apiVersion: apps/v1
kind: Deployment
metadata: 
  name: python-app
  labels: 
    app: python-tag
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: python-tag
  template:
    metadata:
      labels:
        app: python-tag
    spec:
      containers:
        - name: python-container
          image: kiruthika91/python-devops:latest
          ports:
            - containerPort: 5000

